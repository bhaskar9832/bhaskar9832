name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: bhaskar9832
          outputs: |
            dist/github-snake.svg?color_snake=#FFD700&color_dots=#FFFFFF,#FFF8DC,#ADFF2F,#39D353,#00C853
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#FFD700&color_dots=#FFFFFF,#FFF8DC,#ADFF2F,#39D353,#00C853

      - name: Push snake animation to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
